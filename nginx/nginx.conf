server {
    listen 80;
    server_name ffmpeg-api.similartoolz.net;

    # base64 audio segments in /render/dub/:userId can be large; must be >=
    # the app's own body-parser limit (100mb, set in src/main.ts) or nginx
    # will reject the request with 413 before it ever reaches the app.
    client_max_body_size 100m;

    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://app:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
