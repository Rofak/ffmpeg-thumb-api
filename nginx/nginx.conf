# This is a host-level nginx vhost, not a Docker service - the server
# already runs another app's nginx inside its own docker-compose, which
# owns port 80 there. Running a second nginx container from this repo's
# own compose file would conflict with it (only one process can bind a
# given host port). Instead, install nginx directly on the Ubuntu host
# (apt install nginx) as the single front door for all apps, and copy
# this file to /etc/nginx/sites-available/ffmpeg-api, then:
#   ln -s /etc/nginx/sites-available/ffmpeg-api /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# The app's own container still publishes 3002 to the host (see
# docker-compose.yml), so proxy_pass can reach it via 127.0.0.1 directly -
# no Docker inter-container networking involved.
server {
    listen 80;
    server_name ffmpeg-api.similartoolz.net;

    # base64 audio segments in /render/dub/:userId can be large; must be >=
    # the app's own body-parser limit (100mb, set in src/main.ts) or nginx
    # will reject the request with 413 before it ever reaches the app.
    client_max_body_size 100m;

    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
